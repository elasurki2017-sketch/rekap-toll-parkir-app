<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rekapan Pembayaran Toll Parkir</title>

<!-- PDF Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>

body{
    font-family:Arial,sans-serif;
    margin:10px;
    background:#f5f5f5;
}

.container{
    background:#fff;
    padding:12px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.10);
}

h2{
    text-align:center;
    font-size:20px;
    margin-bottom:15px;
}

.info-box{
    border:1px solid #999;
    padding:10px;
    border-radius:8px;
    margin-bottom:15px;
    background:#fafafa;
}

.total-box{
    border:1px solid #999;
    padding:10px;
    border-radius:8px;
    margin-top:20px;   /* jarak dari tabel */
    margin-bottom:15px;
    background:#fafafa;
}

.info-row,.total-row{
    display:flex;
    align-items:center;
    margin:6px 0;
    gap:8px;
}

.info-label,.total-label{
    width:110px;
    font-size:12px;
}

.info-input,.total-input{
    width:220px;
    padding:6px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
    font-size:12px;
}

.total-input{
    text-align:right;
}

.top-btn,.pdf-btn{
    background:#1976d2;
    color:white;
    border:none;
    padding:7px 12px;
    border-radius:5px;
    cursor:pointer;
    font-size:12px;
}

.export-box{
    margin-top:10px;
    display:flex;
    justify-content:flex-end;
}
    
.table-wrap{
    overflow-x:auto;
}

table{
    width:100%;
    min-width:950px;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    text-align:center;
    padding:5px;
    font-size:12px;
}

th{
    background:#1976d2;
    color:white;
}

input,select{
    padding:6px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
    font-size:12px;
}

input[type="date"]{
    width:120px;
}

input[type="number"]{
    width:60px;
}

.rupiah{
    width:90px;
    text-align:right;
}

.textbox{
    width:100px;
}


    
</style>
</head>

<body>

<div class="container">

<h2>LAPORAN TOLL PARKIR</h2>

<div class="info-box">

<div class="info-row">
<span class="info-label">Nama User</span>
<input id="namaUser" class="info-input" value="Mr. Takuya Yokohama">
</div>

<div class="info-row">
<span class="info-label">Driver</span>
<input id="driver" class="info-input" value="Surki">
</div>

<div class="info-row">

<span class="info-label">Periode</span>

<select id="bulan" class="info-input" style="width:120px;">
<option value="">Bulan</option>
<option>Januari</option>
<option>Februari</option>
<option>Maret</option>
<option>April</option>
<option>Mei</option>
<option>Juni</option>
<option>Juli</option>
<option>Agustus</option>
<option>September</option>
<option>Oktober</option>
<option>November</option>
<option>Desember</option>
</select>

<input 
  type="text"
  id="tahun"
  class="info-input"
  style="width:90px;"
  placeholder="Tahun"
  maxlength="4"
  oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<button class="top-btn" onclick="tampilkanPeriode()">Tampilkan</button>

</div>

</div>

<div class="table-wrap">

<table>

<thead>
<tr>
<th>No</th>
<th>Tanggal</th>
<th>Lokasi Awal</th>
<th>Tujuan Akhir</th>
<th>Parkir</th>
<th>Flazz BCA</th>
<th>Tunai</th>
<th>KM</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>

</table>

</div>

<div class="total-box">

<div class="total-row">
<span class="total-label">Total Flazz BCA</span>
<input id="totalFlazz" class="total-input" readonly>
</div>

<div class="total-row">
<span class="total-label">Total Tunai</span>
<input id="totalTunai" class="total-input" readonly>
</div>

<div class="total-row">
<span class="total-label">Sub Total</span>
<input id="grandTotal" class="total-input" readonly>
</div>

</div>

<!-- PINDAH KE SINI -->
<div class="export-box">
<button class="pdf-btn" onclick="exportPDF()">Export PDF</button>
</div>

</div>
<script>

const body = document.getElementById("tableBody");

/* =========================
   PERIODE
========================= */

function ambilPeriode(){

  let bulan =
  document.getElementById("bulan").value;

  let tahun =
  document.getElementById("tahun").value;

  if(bulan==="" || tahun===""){
    return "";
  }

  return bulan + " " + tahun;
}

/* =========================
   TEMPLATE ROW
========================= */

function buatRow(no,data={}){

return `
<tr>

<td>${no}</td>

<td>
<input type="date"
value="${data.tanggal || ''}">
</td>

<td>
<input class="textbox"
type="text"
value="${data.awal || ''}">
</td>

<td>
<input class="textbox"
type="text"
value="${data.akhir || ''}">
</td>

<td>
<input class="textbox"
type="text"
value="${data.parkir || ''}">
</td>

<td>
<input class="rupiah flazz"
type="text"
value="${data.flazz || ''}">
</td>

<td>
<input class="rupiah tunai"
type="text"
value="${data.tunai || ''}">
</td>

<td>
<input type="number"
value="${data.km || ''}">
</td>

<td>
<select onchange="aksiBaris(this)">
<option value="">
${data.status==="tersimpan" ? "Tersimpan" : "Pilih"}
</option>
<option value="simpan">Simpan</option>
<option value="tambah">Tambah</option>
<option value="hapus">Hapus</option>
</select>
</td>

</tr>
`;
}

/* =========================
   FORMAT RUPIAH
========================= */

function formatRupiah(angka){

let number =
angka.replace(/[^0-9]/g,'');

if(number==="") return "";

return "Rp. " +
Number(number)
.toLocaleString("id-ID");
}

/* =========================
   HITUNG TOTAL
========================= */

function hitungTotal(){

let totalFlazz = 0;
let totalTunai = 0;

document
.querySelectorAll("#tableBody tr")
.forEach(row=>{

let inputs =
row.querySelectorAll("input");

let flazz =
inputs[4].value
.replace(/[^0-9]/g,'');

let tunai =
inputs[5].value
.replace(/[^0-9]/g,'');

totalFlazz += Number(flazz || 0);
totalTunai += Number(tunai || 0);

});

let subtotal =
totalFlazz + totalTunai;

document
.getElementById("totalFlazz").value =
"Rp. " +
totalFlazz.toLocaleString("id-ID");

document
.getElementById("totalTunai").value =
"Rp. " +
totalTunai.toLocaleString("id-ID");

document
.getElementById("grandTotal").value =
"Rp. " +
subtotal.toLocaleString("id-ID");

}

/* =========================
   INPUT EVENT
========================= */

document.addEventListener(
"input",
function(e){

if(
e.target.classList.contains("rupiah")
){
  e.target.value =
  formatRupiah(e.target.value);
}

hitungTotal();

}
);

/* =========================
   UPDATE NOMOR
========================= */

function updateNomor(){

let rows =
document.querySelectorAll(
"#tableBody tr"
);

rows.forEach((row,index)=>{

row.cells[0].innerText =
index + 1;

});

}

/* =========================
   SAVE SATU BARIS
========================= */

function saveBaris(row){

let periode =
ambilPeriode();

if(periode===""){
  alert("Periode wajib diisi");
  return false;
}

let tanggal =
row.querySelector(
'input[type="date"]'
).value;

if(tanggal===""){
  alert("Tanggal wajib diisi");
  return false;
}

let no =
parseInt(row.cells[0].innerText)-1;

let allData =
JSON.parse(
localStorage.getItem(
"databaseRekap"
)
) || {};

if(!allData[periode]){

allData[periode] = {
namaUser:
document
.getElementById(
"namaUser"
).value,

driver:
document
.getElementById(
"driver"
).value,

periode:periode,

rows:[]
};

}

let inputs =
row.querySelectorAll(
"input"
);

let rowData = {
  tanggal: inputs[0].value,
  awal: inputs[1].value,
  akhir: inputs[2].value,
  parkir: inputs[3].value,
  flazz: inputs[4].value,
  tunai: inputs[5].value,
  km: inputs[6].value,
  status: "tersimpan"
};

allData[periode]
.rows[no] = rowData;

localStorage.setItem(
"databaseRekap",
JSON.stringify(allData)
);

localStorage.setItem(
"lastPeriode",
periode
);

alert("Data berhasil disimpan");

return true;

}

/* =========================
   AKSI BARIS
========================= */

function aksiBaris(el){

let row =
el.closest("tr");

if(el.value==="simpan"){

  let berhasil = saveBaris(row);

  if(berhasil){
    el.options[0].text = "Tersimpan";
    el.value = "";
  }

}
    
if(el.value==="tambah"){

row.insertAdjacentHTML(
"afterend",
buatRow(0)
);

updateNomor();
deteksiPerubahan();

}

if(el.value==="hapus"){

  let periode = ambilPeriode();

  let no =
  parseInt(
    row.cells[0].innerText
  ) - 1;

  // hapus dari localStorage
  let allData =
  JSON.parse(
    localStorage.getItem(
      "databaseRekap"
    )
  ) || {};

  if(
    allData[periode] &&
    allData[periode].rows
  ){

    // hapus data index baris
    allData[periode]
    .rows
    .splice(no,1);

    localStorage.setItem(
      "databaseRekap",
      JSON.stringify(allData)
    );

  }

  // hapus row html
  row.remove();

  updateNomor();

  // kalau kosong semua, buat 1 row baru
  if(
    document.querySelectorAll(
      "#tableBody tr"
    ).length===0
  ){

    body.insertAdjacentHTML(
      "beforeend",
      buatRow(1)
    );

    deteksiPerubahan();

  }

}

el.value="";

}

/* =========================
   DETEKSI PERUBAHAN
========================= */
    
function deteksiPerubahan(){

  document.querySelectorAll("#tableBody tr").forEach(row => {

    let inputs = row.querySelectorAll("input");
    let select = row.querySelector("select");

    inputs.forEach(input => {

      // supaya listener tidak dobel
      if(input.dataset.binded) return;
      input.dataset.binded = "yes";

      input.addEventListener("input", function(){

        // jika sebelumnya tersimpan, ubah lagi
        if(select.options[0].text === "Tersimpan"){

          select.options[0].text = "Simpan";

          let periode = ambilPeriode();
          let no = parseInt(row.cells[0].innerText)-1;

          let allData =
          JSON.parse(
            localStorage.getItem("databaseRekap")
          ) || {};

          if(
            allData[periode] &&
            allData[periode].rows[no]
          ){
            allData[periode].rows[no].status = "";

            localStorage.setItem(
              "databaseRekap",
              JSON.stringify(allData)
            );
          }

        }

      });

    });

  });

}

    
    
/* =========================
   TAMPILKAN DATA PERIODE
========================= */

function tampilkanPeriode(){

let periode =
ambilPeriode();

if(periode===""){
  alert("Pilih periode");
  return;
}

let allData =
JSON.parse(
localStorage.getItem(
"databaseRekap"
)
) || {};

body.innerHTML = "";

if(allData[periode]){

allData[periode]
.rows
.forEach((item,index)=>{

body.insertAdjacentHTML(
"beforeend",
buatRow(index+1,item)
);

});

document
.getElementById("namaUser").value =
allData[periode].namaUser;

document
.getElementById("driver").value =
allData[periode].driver;

}else{

body.insertAdjacentHTML(
"beforeend",
buatRow(1)
);

}

hitungTotal();
deteksiPerubahan();

}

/* =========================
   LOAD AWAL
========================= */

function loadAwal(){

let last =
localStorage.getItem(
"lastPeriode"
);

if(last){

let p = last.split(" ");

document
.getElementById("bulan").value =
p[0];

document
.getElementById("tahun").value =
p[1];

tampilkanPeriode();

}else{

body.insertAdjacentHTML(
"beforeend",
buatRow(1)
);

deteksiPerubahan();
    
}

}

loadAwal();

</script>
<script>

/* =========================
   EXPORT PDF
========================= */


function exportPDF(){

  let rows = document.querySelectorAll("#tableBody tr");
  let adaData = false;

  rows.forEach(row=>{
    let inputs = row.querySelectorAll("input");
    for(let i=0;i<inputs.length;i++){
      if(inputs[i].value.trim()!==""){
        adaData = true;
        break;
      }
    }
  });

  if(!adaData){
    alert("Belum ada data untuk Export PDF");
    return;
  }

  const { jsPDF } = window.jspdf;
  let doc = new jsPDF("p","mm","a4");

  // ukuran kolom standar (atas & bawah sama)
  let col1 = 45;
  let col2 = 130;

  let bulan = document.getElementById("bulan").value;
  let tahun = document.getElementById("tahun").value;
  let periode = (bulan && tahun)
  ? bulan + " " + tahun
  : "-";


  /* ================= HEADER ================= */

  doc.setFont("helvetica","bold");
  doc.setFontSize(11);
  doc.text("PT TOYOTA ASTRA MOTOR",15,10);

  doc.setFont("helvetica","normal");
  doc.setFontSize(8);
  doc.text("Human Resource and General Affair Division",15,15);
  doc.text("General Affair Department",15,19);

  doc.setFont("helvetica","bold");
  doc.setFontSize(16);
  doc.text("LAPORAN TOLL PARKIR",105,28,{align:"center"});

  // garis bawah judul
  doc.line(62,30,148,30);


  /* ================= STYLE ================= */

  doc.setLineWidth(0.2);
  doc.setDrawColor(180,180,180);


  /* ================= IDENTITAS ================= */

 // isi data
let namaUser = document.getElementById('namaUser').value;
let driver = document.getElementById('driver').value;
let periodeText = `${bulan} ${tahun}`;

// hitung teks terpanjang kolom kiri
let kiriTerpanjang = ["Nama User","Driver","Periode"]
  .reduce((a,b)=> a.length > b.length ? a : b);

// hitung teks terpanjang kolom kanan
let kananTerpanjang = [namaUser,driver,periodeText]
  .reduce((a,b)=> a.length > b.length ? a : b);

// lebar otomatis
let lebarKolom1 = doc.getTextWidth(kiriTerpanjang) + 8;
let lebarKolom2 = doc.getTextWidth(kananTerpanjang) + 8;

// batasi supaya tidak terlalu lebar
if(lebarKolom2 > 120) lebarKolom2 = 120;

doc.autoTable({
  startY:48,
  body:[
    ['Nama User', namaUser],
    ['Driver', driver],
    ['Periode', periodeText]
  ],
  theme:'grid',
  styles:{
    fontSize:9,
    cellPadding:2
  },
  columnStyles:{
    0:{ cellWidth: lebarKolom1 },
    1:{ cellWidth: lebarKolom2 }
  }
});


  /* ================= TABEL DATA ================= */

  let tableData = [];

  document
  .querySelectorAll("#tableBody tr")
  .forEach(row=>{

    let inputs = row.querySelectorAll("input");

    tableData.push([
      row.cells[0].innerText,
      inputs[0].value,
      inputs[1].value,
      inputs[2].value,
      inputs[3].value,
      inputs[4].value,
      inputs[5].value,
      inputs[6].value
    ]);

  });

  doc.autoTable({

    startY: doc.lastAutoTable.finalY + 8,

    head:[[
      "No",
      "Tanggal",
      "Lokasi Awal",
      "Tujuan",
      "Parkir",
      "Flazz BCA",
      "Tunai",
      "KM"
    ]],

    body: tableData,

    theme:"grid",

    styles:{
      fontSize:8,
      lineWidth:0.2,
      lineColor:[180,180,180]
    },

    headStyles:{
      fontSize:8
    },

    columnStyles:{
      0:{cellWidth:10},
      1:{cellWidth:22},
      2:{cellWidth:35},
      3:{cellWidth:35},
      4:{cellWidth:22},
      5:{cellWidth:25},
      6:{cellWidth:20},
      7:{cellWidth:12}
    }

  });


  /* ================= TOTAL ================= */

  doc.setFontSize(9);

  let finalY = doc.lastAutoTable.finalY + 10;

  let totalX = 15;
  let totalW1 = col1;
  let totalW2 = col2;


  // Total Flazz
  doc.rect(totalX,finalY,totalW1,8);
  doc.rect(totalX+totalW1,finalY,totalW2,8);

  doc.text("Total Flazz BCA",totalX+2,finalY+5.5);

  doc.text(
    document.getElementById("totalFlazz").value,
    totalX+totalW1+totalW2-4,
    finalY+5.5,
    {align:"right"}
  );


  // Total Tunai
  doc.rect(totalX,finalY+8,totalW1,8);
  doc.rect(totalX+totalW1,finalY+8,totalW2,8);

  doc.text("Total Tunai",totalX+2,finalY+13.5);

  doc.text(
    document.getElementById("totalTunai").value,
    totalX+totalW1+totalW2-4,
    finalY+13.5,
    {align:"right"}
  );


  // Sub Total
  doc.rect(totalX,finalY+16,totalW1,8);
  doc.rect(totalX+totalW1,finalY+16,totalW2,8);

  doc.text("Sub Total",totalX+2,finalY+21.5);

  doc.text(
    document.getElementById("grandTotal").value,
    totalX+totalW1+totalW2-4,
    finalY+21.5,
    {align:"right"}
  );


  /* ================= SAVE ================= */

  let namaFile =
  "Rekapan_" +
  periode.replace(/\s+/g,"_") +
  ".pdf";

  doc.save(namaFile);

}
</script>

</body>
</html>
